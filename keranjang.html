    <!-- NAVBAR -->

    </section>


    <!-- ISI KERANJANG -->
    <section class="cart-container">

        <div class="cart-item">

            <img src="gambar/produk5 mocah.jpg" alt="coffee mocah">

            <div class="cart-info">
                <h3>Kopi Arabika Bajawa</h3>
                <p>250gr</p>

            </div>

            <div class="cart-qty">
                <input type="number" value="1" min="1">
            </div>

            <div class="cart-remove">
                <i class="fas fa-trash"></i>
            </div>

        </div>


        <!-- TOTAL -->
        <div class="cart-summary">

                Checkout
